<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Financial News Analyzer{% endblock %}</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Plotly -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <style>
    /* ══════════════════════════════════════════════
       DESIGN TOKENS
    ══════════════════════════════════════════════ */
    :root {
        --bg-deep:      #04080f;
        --bg-mid:       #080e1c;
        --bg-card:      #0d1526;
        --bg-card-alt:  #101c30;
        --accent:       #00e5ff;
        --accent2:      #7c3aed;
        --accent3:      #10b981;
        --warn:         #f59e0b;
        --danger:       #ef4444;
        --text:         #e2e8f0;
        --text-muted:   #64748b;
        --border:       rgba(0,229,255,0.12);
        --border-hover: rgba(0,229,255,0.45);
        --glow:         0 0 40px rgba(0,229,255,0.15);
        --glow-strong:  0 0 60px rgba(0,229,255,0.35);
        --radius:       14px;
        --radius-sm:    8px;
        --font-display: 'Syne', sans-serif;
        --font-mono:    'Space Mono', monospace;
    }

    /* ══════════════════════════════════════════════
       RESET & BASE
    ══════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
        background-color: var(--bg-deep);
        background-image:
            radial-gradient(ellipse 80% 60% at 20% -10%, rgba(124,58,237,0.18) 0%, transparent 60%),
            radial-gradient(ellipse 60% 50% at 85% 110%, rgba(0,229,255,0.12) 0%, transparent 55%),
            url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%2300e5ff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        font-family: var(--font-display);
        min-height: 100vh;
        color: var(--text);
        opacity: 0;
        animation: pageIn 0.6s ease forwards;
    }

    @keyframes pageIn {
        to { opacity: 1; transform: translateY(0); }
        from { opacity: 0; transform: translateY(12px); }
    }

    /* ══════════════════════════════════════════════
       NAVBAR
    ══════════════════════════════════════════════ */
    .topbar {
        position: sticky;
        top: 0;
        z-index: 999;
        background: rgba(4, 8, 15, 0.75);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border);
        padding: 0 2rem;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    /* animated left border glow on scroll */
    .topbar::after {
        content: '';
        position: absolute;
        bottom: 0; left: 0; right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
        opacity: 0.6;
    }

    /* brand */
    .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        font-family: var(--font-display);
        font-weight: 800;
        font-size: 1.15rem;
        letter-spacing: -0.5px;
        color: var(--text);
        transition: color 0.2s;
    }
    .brand:hover { color: var(--accent); }

    .brand-icon {
        width: 34px; height: 34px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
        font-size: 1rem;
        box-shadow: 0 0 16px rgba(0,229,255,0.4);
        flex-shrink: 0;
    }

    .brand-tag {
        font-size: 0.6rem;
        font-family: var(--font-mono);
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: 2px;
        display: block;
        line-height: 1;
    }

    /* nav links */
    .nav-links {
        display: flex;
        align-items: center;
        gap: 4px;
        list-style: none;
    }

    .nav-links a {
        position: relative;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 14px;
        border-radius: 8px;
        font-family: var(--font-display);
        font-weight: 600;
        font-size: 0.875rem;
        color: var(--text-muted);
        text-decoration: none;
        transition: all 0.2s;
        letter-spacing: 0.3px;
    }

    .nav-links a i {
        font-size: 0.78rem;
        transition: transform 0.2s;
    }

    .nav-links a:hover {
        color: var(--accent);
        background: rgba(0,229,255,0.08);
    }

    .nav-links a:hover i { transform: scale(1.2); }

    .nav-links a.active {
        color: var(--accent);
        background: rgba(0,229,255,0.1);
        border: 1px solid rgba(0,229,255,0.25);
    }

    /* live pulse dot */
    .live-dot {
        width: 7px; height: 7px;
        border-radius: 50%;
        background: var(--accent3);
        box-shadow: 0 0 8px var(--accent3);
        animation: pulse 2s infinite;
        flex-shrink: 0;
    }
    @keyframes pulse {
        0%,100% { opacity:1; transform: scale(1); }
        50%      { opacity:0.5; transform: scale(0.7); }
    }

    .topbar-right {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .status-chip {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 12px;
        border-radius: 20px;
        background: rgba(16,185,129,0.1);
        border: 1px solid rgba(16,185,129,0.25);
        font-family: var(--font-mono);
        font-size: 0.68rem;
        color: var(--accent3);
        letter-spacing: 1px;
    }

    /* ══════════════════════════════════════════════
       MAIN LAYOUT
    ══════════════════════════════════════════════ */
    .main-wrap {
        max-width: 1280px;
        margin: 0 auto;
        padding: 2rem 1.5rem 4rem;
    }

    /* ══════════════════════════════════════════════
       PAGE TITLE
    ══════════════════════════════════════════════ */
    .page-title {
        font-family: var(--font-display);
        font-weight: 800;
        font-size: clamp(1.5rem, 3vw, 2.2rem);
        letter-spacing: -0.5px;
        margin-bottom: 1.5rem;
        background: linear-gradient(120deg, #fff 0%, var(--accent) 60%, var(--accent2) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    /* ══════════════════════════════════════════════
       CARDS
    ══════════════════════════════════════════════ */
    .card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s;
        overflow: hidden;
    }

    .card:hover {
        border-color: var(--border-hover);
        box-shadow: var(--glow);
        transform: translateY(-3px);
    }

    .card-header {
        background: rgba(0,229,255,0.04);
        border-bottom: 1px solid var(--border);
        padding: 1rem 1.25rem;
        font-family: var(--font-display);
        font-weight: 700;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .card-body {
        padding: 1.25rem;
        color: var(--text);
    }

    /* ══════════════════════════════════════════════
       METRIC CARDS
    ══════════════════════════════════════════════ */
    .metric-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.5rem;
        text-align: center;
        transition: all 0.3s;
        position: relative;
        overflow: hidden;
    }

    .metric-card::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        opacity: 0;
        transition: opacity 0.3s;
    }

    .metric-card:hover { border-color: var(--border-hover); box-shadow: var(--glow); transform: translateY(-4px); }
    .metric-card:hover::before { opacity: 1; }

    .metric-number {
        font-family: var(--font-mono);
        font-size: 2.2rem;
        font-weight: 700;
        color: var(--accent);
        line-height: 1;
        margin: 0.5rem 0;
    }

    .metric-label {
        font-size: 0.8rem;
        color: var(--text-muted);
        letter-spacing: 1px;
        text-transform: uppercase;
        font-family: var(--font-mono);
    }

    .metric-icon {
        width: 42px; height: 42px;
        border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto 0.5rem;
        font-size: 1.1rem;
    }

    /* ══════════════════════════════════════════════
       BUTTONS
    ══════════════════════════════════════════════ */
    .btn-primary {
        background: linear-gradient(135deg, var(--accent), #0099cc);
        border: none;
        border-radius: 10px;
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 0.9rem;
        color: #04080f;
        padding: 0.6rem 1.4rem;
        transition: all 0.25s;
        letter-spacing: 0.3px;
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0,229,255,0.4);
        color: #04080f;
    }

    .btn-primary:active { transform: translateY(0); }

    /* outline variant */
    .btn-outline-accent {
        background: transparent;
        border: 1px solid var(--accent);
        border-radius: 10px;
        font-family: var(--font-display);
        font-weight: 600;
        font-size: 0.875rem;
        color: var(--accent);
        padding: 0.5rem 1.2rem;
        transition: all 0.25s;
        cursor: pointer;
    }
    .btn-outline-accent:hover {
        background: rgba(0,229,255,0.1);
        transform: translateY(-1px);
    }

    /* ══════════════════════════════════════════════
       SENTIMENT BADGES
    ══════════════════════════════════════════════ */
    .sentiment-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 4px 12px;
        border-radius: 20px;
        font-family: var(--font-mono);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.5px;
    }

    .bullish  { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
    .bearish  { background: rgba(239,68,68,0.15);  color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
    .neutral  { background: rgba(245,158,11,0.15); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }

    /* ══════════════════════════════════════════════
       COMPANY BADGE
    ══════════════════════════════════════════════ */
    .company-badge {
        display: inline-flex;
        align-items: center;
        padding: 3px 10px;
        border-radius: 6px;
        background: rgba(0,229,255,0.1);
        border: 1px solid rgba(0,229,255,0.25);
        color: var(--accent);
        font-family: var(--font-mono);
        font-size: 0.75rem;
        font-weight: 700;
        margin: 2px;
        letter-spacing: 0.5px;
        transition: all 0.2s;
    }
    .company-badge:hover { background: rgba(0,229,255,0.2); transform: scale(1.05); }

    /* ══════════════════════════════════════════════
       LOADING
    ══════════════════════════════════════════════ */
    .loading { display: none; text-align: center; padding: 3rem 0; }

    .spinner {
        width: 48px; height: 48px;
        border-radius: 50%;
        border: 3px solid rgba(0,229,255,0.1);
        border-top-color: var(--accent);
        animation: spin 0.9s linear infinite;
        margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading p { color: var(--text-muted); font-family: var(--font-mono); font-size: 0.85rem; letter-spacing: 1px; }

    /* ══════════════════════════════════════════════
       ALERTS
    ══════════════════════════════════════════════ */
    .alert-success-custom {
        background: rgba(16,185,129,0.1);
        border: 1px solid rgba(16,185,129,0.3);
        border-radius: var(--radius-sm);
        padding: 0.75rem 1rem;
        color: #10b981;
        font-family: var(--font-mono);
        font-size: 0.85rem;
    }

    .alert-error-custom {
        background: rgba(239,68,68,0.1);
        border: 1px solid rgba(239,68,68,0.3);
        border-radius: var(--radius-sm);
        padding: 0.75rem 1rem;
        color: #ef4444;
        font-family: var(--font-mono);
        font-size: 0.85rem;
    }

    /* legacy compat */
    .error-message   { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.3);  border-radius: var(--radius-sm); padding: 0.75rem 1rem; color: #ef4444; }
    .success-message { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); border-radius: var(--radius-sm); padding: 0.75rem 1rem; color: #10b981; }

    /* ══════════════════════════════════════════════
       SCROLLBAR
    ══════════════════════════════════════════════ */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-deep); }
    ::-webkit-scrollbar-thumb { background: rgba(0,229,255,0.3); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* ══════════════════════════════════════════════
       FOOTER
    ══════════════════════════════════════════════ */
    .site-footer {
        text-align: center;
        padding: 1.5rem;
        border-top: 1px solid var(--border);
        color: var(--text-muted);
        font-family: var(--font-mono);
        font-size: 0.75rem;
        letter-spacing: 0.5px;
        margin-top: 2rem;
    }

    .site-footer span {
        color: var(--accent);
    }

    /* ══════════════════════════════════════════════
       FORM CONTROLS
    ══════════════════════════════════════════════ */
    .form-control {
        background: rgba(255,255,255,0.05) !important;
        border: 1px solid var(--border) !important;
        border-radius: var(--radius-sm) !important;
        color: var(--text) !important;
        font-family: var(--font-display);
        transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-control:focus {
        border-color: rgba(0,229,255,0.5) !important;
        box-shadow: 0 0 0 3px rgba(0,229,255,0.1) !important;
        outline: none;
    }
    .form-control::placeholder { color: var(--text-muted) !important; }

    /* ══════════════════════════════════════════════
       CHART CONTAINER
    ══════════════════════════════════════════════ */
    .chart-container {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.5rem;
        transition: border-color 0.3s;
    }
    .chart-container:hover { border-color: var(--border-hover); }

    /* ══════════════════════════════════════════════
       UTILITY
    ══════════════════════════════════════════════ */
    .text-accent  { color: var(--accent) !important; }
    .text-accent2 { color: var(--accent2) !important; }
    .text-success-g { color: var(--accent3) !important; }
    .text-muted-custom { color: var(--text-muted) !important; font-family: var(--font-mono); font-size: 0.82rem; }
    .mono { font-family: var(--font-mono); }

    /* glow text */
    .glow-text {
        color: var(--accent);
        text-shadow: 0 0 20px rgba(0,229,255,0.5);
    }

    /* divider */
    .divider {
        border: none;
        border-top: 1px solid var(--border);
        margin: 1.5rem 0;
    }

    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>

<!-- ══ NAVBAR ══════════════════════════════════════════════════════════════ -->
<nav class="topbar">
    <!-- Brand -->
    <a href="/" class="brand">
        <div class="brand-icon">📈</div>
        <div>
            <div style="line-height:1.1;">AI Analyzer</div>
            <span class="brand-tag">FINANCIAL INTELLIGENCE</span>
        </div>
    </a>

    <!-- Nav Links -->
    <ul class="nav-links" id="nav-links">
        <li><a href="/news"      id="nav-news">      <i class="fas fa-newspaper"></i>    News</a></li>
        <li><a href="/dashboard" id="nav-dashboard"> <i class="fas fa-chart-pie"></i>    Dashboard</a></li>
        <li><a href="/companies" id="nav-companies"> <i class="fas fa-building"></i>     Companies</a></li>
        <li><a href="/chatbot"   id="nav-chatbot">   <i class="fas fa-robot"></i>        Chatbot</a></li>
    </ul>

    <!-- Right side -->
    <div class="topbar-right">
        <div class="status-chip">
            <span class="live-dot"></span>
            LIVE
        </div>
    </div>
</nav>

<!-- ══ MAIN ════════════════════════════════════════════════════════════════ -->
<div class="main-wrap">
    {% block content %}{% endblock %}
</div>

<!-- ══ FOOTER ══════════════════════════════════════════════════════════════ -->
<footer class="site-footer">
    Built with <span>♥</span> using <span>FastAPI</span> · <span>Groq AI</span> · <span>Flask</span>
</footer>

<script>
// ── Active nav link highlight ────────────────────────────────────────────────
(function() {
    const path = window.location.pathname;
    const map = {
        '/news':      'nav-news',
        '/dashboard': 'nav-dashboard',
        '/companies': 'nav-companies',
        '/chatbot':   'nav-chatbot',
    };
    const id = map[path];
    if (id) {
        const el = document.getElementById(id);
        if (el) el.classList.add('active');
    }
})();

// ── Navbar scroll shadow ─────────────────────────────────────────────────────
window.addEventListener('scroll', () => {
    const nav = document.querySelector('.topbar');
    if (window.scrollY > 10) {
        nav.style.boxShadow = '0 4px 30px rgba(0,0,0,0.5)';
    } else {
        nav.style.boxShadow = 'none';
    }
});
</script>

{% block extra_js %}{% endblock %}
</body>
</html>
